services:
  web:
    build: .
    image: vwap-web:dev
    container_name: vwap-web
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      # ホスト側ソースをマウントしてホットリロードを効かせる
      - ./:/app
      # コンテナ内のキャッシュ領域がホストを汚染しないよう無名ボリュームで隔離
      - /app/__pycache__
    restart: unless-stopped
